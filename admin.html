<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ふわバド | 管理者ページ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F9F4; --surface:#FFFFFF; --text:#24312B; --muted:#6B7A70;
    --accent:#3F7D4A; --accent-dark:#2F5F38; --warn:#D9534F; --line:#E1E7DC;
  }
  *{box-sizing:border-box; min-width:0;}
  html, body{overflow-x:hidden; max-width:100%;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:'Noto Sans JP', sans-serif; line-height:1.7;}
  h1,h2{font-family:'Zen Maru Gothic', sans-serif;}
  header{padding:24px 16px 12px; text-align:center;}
  header h1{font-size:22px; color:var(--accent-dark); margin:0;}
  main{max-width:560px; margin:0 auto; padding:0 16px 60px; overflow-x:hidden;}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:14px; max-width:100%;}
  label.field{display:block; font-size:13px; font-weight:700; margin:12px 0 6px; color:var(--accent-dark);}
  input[type=text], input[type=password], input[type=number], input[type=date], input[type=datetime-local], textarea, select{
    width:100%; max-width:100%; padding:9px 11px; border-radius:9px; border:1px solid var(--line); font-family:inherit; font-size:15px;
    -webkit-appearance:none; -moz-appearance:none; appearance:none; background-color:#fff;
  }
  select{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none'><path d='M6 9l6 6 6-6' stroke='%236B7A70' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat; background-position:right 10px center; background-size:16px; padding-right:32px;
  }
  .time-select-row{display:flex; align-items:center; gap:8px;}
  .time-select-row select{flex:1;}
  .toggle-more{background:none; border:none; color:var(--accent-dark); font-size:13px; font-weight:700; padding:6px 0; text-decoration:underline; cursor:pointer;}
  .auto-note{font-size:12px; color:var(--muted); margin-top:4px;}
  textarea{min-height:70px; resize:vertical;}
  button{
    border:none; border-radius:10px; padding:11px 16px; font-size:14px; font-weight:700; cursor:pointer;
  }
  button.primary{background:var(--accent); color:#fff; width:100%;}
  button.secondary{background:#EDF1EA; color:var(--accent-dark);}
  button.danger{background:#FCECEC; color:var(--warn);}
  .tabs{display:flex; gap:8px; margin-bottom:14px;}
  .tabs button{flex:1; background:#EDF1EA; color:var(--muted);}
  .tabs button.active{background:var(--accent); color:#fff;}
  .event-row{border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:8px; max-width:100%;}
  .event-row .info{font-size:13px;}
  .event-row .info b{font-size:14px;}
  .event-row .actions{display:flex; gap:8px; margin-top:8px;}
  .event-row .actions button{flex:1; font-size:12px; padding:8px 10px;}
  .badge{font-size:11px; padding:2px 8px; border-radius:999px; background:#EAF3EB; color:var(--accent-dark); font-weight:700;}
  .badge.ebi{background:#FDEFE3; color:#B5651D;}
  .msg{font-size:13px; color:var(--warn); margin-top:8px;}
  table{width:100%; max-width:100%; border-collapse:collapse; font-size:13px;}
  th, td{border-bottom:1px solid var(--line); padding:6px 4px; text-align:left;}
  .hidden{display:none !important;}
  .checkbox-row{display:flex; align-items:center; gap:8px; margin-top:12px;}
</style>
</head>
<body>
<header style="display:flex; align-items:center; justify-content:space-between;">
  <h1>🔒 ふわバド 管理者ページ</h1>
  <span id="logoutBtn" class="hidden" style="font-size:12px; color:var(--muted); text-decoration:underline; cursor:pointer; white-space:nowrap;">ログアウト</span>
</header>
<main>

  <div id="loginView" class="card">
    <label class="field">ユーザー名</label>
    <input type="text" id="loginUser">
    <label class="field">パスワード</label>
    <input type="password" id="loginPass">
    <div class="msg" id="loginMsg" style="display:none;"></div>
    <button class="primary" style="margin-top:14px;" id="loginBtn">ログイン</button>
  </div>

  <div id="adminView" class="hidden">
    <div class="tabs">
      <button id="tabEvents" class="active">開催管理</button>
      <button id="tabApplicants">申込者一覧</button>
    </div>

    <!-- 開催管理タブ -->
    <div id="panelEvents">
      <button class="secondary" style="width:100%; margin-bottom:12px;" id="newEventBtn">+ 新しい開催を作成</button>
      <div id="eventList"></div>

      <div class="card hidden" id="eventForm">
        <h2 style="font-size:16px;" id="formTitle">開催を作成</h2>
        <label class="field">サークル</label>
        <select id="f_circle">
          <option value="ふわバド">ふわバド</option>
          <option value="えびバド">えびバド</option>
        </select>
        <label class="field">開催日</label>
        <input type="date" id="f_date">
        <label class="field">エリア</label>
        <select id="f_area">
          <option value="品川">品川</option>
          <option value="練馬">練馬</option>
          <option value="新宿">新宿</option>
          <option value="板橋">板橋</option>
          <option value="その他">その他(自由入力)</option>
        </select>
        <input type="text" id="f_area_custom" placeholder="エリア名を入力" style="margin-top:6px; display:none;">
        <label class="field">最寄駅</label>
        <input type="text" id="f_station" placeholder="渋谷駅">
        <label class="field">開催時間</label>
        <div class="time-select-row">
          <select id="f_timeStart"></select>
          <span>〜</span>
          <select id="f_timeEnd"></select>
        </div>
        <label class="field">参加費</label>
        <input type="text" id="f_fee" placeholder="800">
        <label class="field">定員</label>
        <input type="number" id="f_capacity" placeholder="20">
        <label class="field">男性上限(任意・女性は定員まで受付)</label>
        <input type="number" id="f_maleCap" placeholder="空欄なら無制限">
        <label class="field">詳細会場情報</label>
        <textarea id="f_venue" placeholder="会場名、更衣室の場所など"></textarea>
        <div class="auto-note" id="autoSendNote"></div>
        <div class="checkbox-row">
          <input type="checkbox" id="f_forceFull">
          <label for="f_forceFull" style="font-size:13px;">手動で満席にする</label>
        </div>

        <button type="button" class="toggle-more" id="toggleMoreBtn">＋ 詳細設定を表示(イベント名・申込締切)</button>
        <div class="hidden" id="moreFields">
          <label class="field">イベント名(任意)</label>
          <input type="text" id="f_name" placeholder="定例練習">
          <label class="field">申込締切日時(任意)</label>
          <input type="datetime-local" id="f_deadline">
        </div>

        <div class="msg" id="formMsg" style="display:none;"></div>
        <button class="primary" style="margin-top:14px;" id="saveEventBtn">保存する</button>
        <button class="secondary" style="width:100%; margin-top:8px;" id="cancelFormBtn">キャンセル</button>
      </div>
    </div>

    <!-- 申込者一覧タブ -->
    <div id="panelApplicants" class="hidden">
      <label class="field">年月を選択</label>
      <select id="applicantMonthSelect"></select>
      <label class="field">開催を選択</label>
      <select id="applicantEventSelect"></select>
      <div class="card" style="margin-top:12px;">
        <div id="applicantSummary" style="font-size:13px; color:var(--muted); margin-bottom:8px;"></div>
        <table>
          <thead><tr><th>受付番号</th><th>名前</th><th>性別</th><th>ラケット</th><th>状況</th></tr></thead>
          <tbody id="applicantRows"></tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwrpszH3-qr9MZzT7WAArJCMmHEMYGahRA2hFQo_JFsGKxeaYclP0ZWzeSoa5UC9MWi/exec';
let token = localStorage.getItem('fuwabado_admin_token') || '';
let allEvents = [];
let editingEventId = null;

async function api(action, payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(Object.assign({ action: action, token: token }, payload || {}))
  });
  return res.json();
}

function showAdmin(){
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('adminView').classList.remove('hidden');
  document.getElementById('logoutBtn').classList.remove('hidden');
  populateTimeSelects();
  setupAreaAutofill();
  loadEvents();
}

// 開催時間の選択肢(6:00〜23:50、10分刻み)を生成
function populateTimeSelects(){
  const opts = [];
  for (let h = 6; h <= 23; h++) {
    for (let m = 0; m < 60; m += 10) {
      const hh = String(h).padStart(2, '0');
      const mm = String(m).padStart(2, '0');
      opts.push(hh + ':' + mm);
    }
  }
  const html = opts.map(t => `<option value="${t}">${t}</option>`).join('');
  document.getElementById('f_timeStart').innerHTML = html;
  document.getElementById('f_timeEnd').innerHTML = html;
  document.getElementById('f_timeStart').value = '19:00';
  document.getElementById('f_timeEnd').value = '21:00';
  document.getElementById('f_timeStart').addEventListener('change', updateAutoSendNote);
  document.getElementById('f_date').addEventListener('change', updateAutoSendNote);
}

// エリア選択に応じて参加費のデフォルト値を自動入力する(手動編集は引き続き可能)
const AREA_FEE_DEFAULTS = { '品川': 800, '練馬': 700, '新宿': 1400, '板橋': 1000 };

function setupAreaAutofill(){
  const areaSelect = document.getElementById('f_area');
  const areaCustom = document.getElementById('f_area_custom');
  areaSelect.addEventListener('change', () => {
    if (areaSelect.value === 'その他') {
      areaCustom.style.display = 'block';
      areaCustom.value = '';
    } else {
      areaCustom.style.display = 'none';
      if (AREA_FEE_DEFAULTS[areaSelect.value] !== undefined) {
        document.getElementById('f_fee').value = AREA_FEE_DEFAULTS[areaSelect.value];
      }
    }
  });
}

// 保存・編集時に使う、実際のエリア文字列を取得するヘルパー
function getAreaValue(){
  const areaSelect = document.getElementById('f_area');
  if (areaSelect.value === 'その他') return document.getElementById('f_area_custom').value.trim();
  return areaSelect.value;
}

// 既存の開催データからエリア欄をセットする(プリセットに一致すればそれを選択、しなければ「その他」+自由入力欄)
function setAreaValue(area){
  const areaSelect = document.getElementById('f_area');
  const areaCustom = document.getElementById('f_area_custom');
  if (AREA_FEE_DEFAULTS[area] !== undefined || area === '') {
    areaSelect.value = area || '品川';
    areaCustom.style.display = 'none';
    areaCustom.value = '';
  } else {
    areaSelect.value = 'その他';
    areaCustom.style.display = 'block';
    areaCustom.value = area;
  }
}

// 「詳細案内は開催2日前の開始時刻に自動送信されます」の表示を更新
function updateAutoSendNote(){
  const dateVal = document.getElementById('f_date').value;
  const startVal = document.getElementById('f_timeStart').value;
  const note = document.getElementById('autoSendNote');
  if (!dateVal || !startVal) { note.textContent = ''; return; }
  const d = new Date(dateVal + 'T' + startVal + ':00');
  if (isNaN(d.getTime())) { note.textContent = ''; return; }
  d.setDate(d.getDate() - 2);
  const y = d.getFullYear(), mo = String(d.getMonth()+1).padStart(2,'0'), da = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0'), mi = String(d.getMinutes()).padStart(2,'0');
  note.textContent = `📅 詳細案内は自動で ${y}-${mo}-${da} ${hh}:${mi} 頃に送信されます(申込締切を別途設定した場合を除く)`;
}

// ログイン
document.getElementById('loginBtn').addEventListener('click', async () => {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const msgEl = document.getElementById('loginMsg');
  msgEl.style.display = 'none';
  if (!username || !password) return;

  const data = await api('adminLogin', { username, password });
  if (!data.success) {
    msgEl.textContent = data.error || 'ログインに失敗しました';
    msgEl.style.display = 'block';
    return;
  }
  token = data.token;
  localStorage.setItem('fuwabado_admin_token', token);
  showAdmin();
});

if (token) showAdmin();

// タブ切り替え
document.getElementById('tabEvents').addEventListener('click', () => switchTab('events'));
document.getElementById('tabApplicants').addEventListener('click', () => switchTab('applicants'));

function switchTab(tab){
  document.getElementById('tabEvents').classList.toggle('active', tab === 'events');
  document.getElementById('tabApplicants').classList.toggle('active', tab === 'applicants');
  document.getElementById('panelEvents').classList.toggle('hidden', tab !== 'events');
  document.getElementById('panelApplicants').classList.toggle('hidden', tab !== 'applicants');
  if (tab === 'applicants') populateApplicantSelect();
}

// 開催一覧の読み込み
async function loadEvents(){
  const data = await api('adminListEvents', {});
  if (!data.success) {
    if (data.error === 'ログインが必要です') { logout(); }
    return;
  }
  allEvents = data.events;
  renderEventList();
}

function renderEventList(){
  const list = document.getElementById('eventList');
  const todayStr = new Date().toISOString().slice(0, 10);
  const upcoming = allEvents.filter(ev => ev.date >= todayStr);
  const past = allEvents.filter(ev => ev.date < todayStr);

  const rowHtml = ev => {
    const badgeClass = ev.circle === 'えびバド' ? 'badge ebi' : 'badge';
    return `
      <div class="event-row">
        <div class="info">
          <span class="${badgeClass}">${ev.circle}</span>
          <b>${ev.date} ${ev.name || ''}</b><br>
          ${ev.area}(${ev.station}) / 定員${ev.currentCount}/${ev.capacity}${ev.forceFull ? ' / 手動満席' : ''}
        </div>
        <div class="actions">
          <button class="secondary" data-edit="${ev.eventId}">編集</button>
          <button class="danger" data-delete="${ev.eventId}" data-count="${ev.currentCount}" data-label="${ev.date} ${ev.name || ''}">削除</button>
        </div>
      </div>`;
  };

  let html = upcoming.map(rowHtml).join('') || '<p style="color:var(--muted); font-size:13px;">開催予定がありません</p>';

  if (past.length > 0) {
    // 年月(YYYY-MM)ごとにグループ化し、新しい月から並べる
    const months = [...new Set(past.map(ev => ev.date.slice(0, 7)))].sort().reverse();
    const monthOptions = months.map(m => {
      const [y, mo] = m.split('-');
      return `<option value="${m}">${y}年${Number(mo)}月</option>`;
    }).join('');

    html += `<div style="margin-top:20px; text-align:center;">
      <span id="togglePastLink" style="font-size:12px; color:var(--muted); text-decoration:underline; cursor:pointer;">過去の開催を見る</span>
    </div>
    <div id="pastEventPanel" class="hidden" style="margin-top:10px;">
      <label class="field">年月で絞り込み</label>
      <select id="pastMonthSelect">
        <option value="">選択してください</option>
        ${monthOptions}
      </select>
      <div id="pastEventList" style="margin-top:8px;"></div>
    </div>`;
  }

  list.innerHTML = html;

  list.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', () => openEditForm(btn.dataset.edit));
  });
  list.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', () => deleteEvent(btn.dataset.delete, Number(btn.dataset.count), btn.dataset.label));
  });

  const toggleLink = document.getElementById('togglePastLink');
  if (toggleLink) {
    toggleLink.addEventListener('click', () => {
      const panel = document.getElementById('pastEventPanel');
      const isHidden = panel.classList.toggle('hidden');
      toggleLink.textContent = isHidden ? '過去の開催を見る' : '過去の開催を隠す';
    });
    document.getElementById('pastMonthSelect').addEventListener('change', (e) => {
      const month = e.target.value;
      const pastListEl = document.getElementById('pastEventList');
      if (!month) { pastListEl.innerHTML = ''; return; }
      const filtered = past.filter(ev => ev.date.slice(0, 7) === month);
      pastListEl.innerHTML = filtered.map(rowHtml).join('');
      pastListEl.querySelectorAll('[data-edit]').forEach(btn => {
        btn.addEventListener('click', () => openEditForm(btn.dataset.edit));
      });
      pastListEl.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', () => deleteEvent(btn.dataset.delete, Number(btn.dataset.count), btn.dataset.label));
      });
    });
  }
}

async function deleteEvent(eventId, count, label){
  const ev = allEvents.find(e => e.eventId === eventId);
  const message = count > 0
    ? `${label} には申込者が${count}人います。本当に削除しますか?(申込データ自体は残りますが、開催情報とこの開催専用のシートは削除されます)`
    : `${label} を削除しますか?`;
  if (!confirm(message)) return;

  const data = await api('adminDeleteEvent', { eventId, circle: ev ? ev.circle : '' });
  if (!data.success) {
    alert(data.error || '削除に失敗しました');
    return;
  }
  await loadEvents();
}

function openCreateForm(){
  editingEventId = null;
  document.getElementById('formTitle').textContent = '開催を作成';
  ['f_date','f_name','f_station','f_fee','f_capacity','f_maleCap','f_deadline','f_venue'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_circle').value = 'ふわバド';
  setAreaValue('');
  document.getElementById('f_timeStart').value = '19:00';
  document.getElementById('f_timeEnd').value = '21:00';
  document.getElementById('f_forceFull').checked = false;
  document.getElementById('moreFields').classList.add('hidden');
  document.getElementById('autoSendNote').textContent = '';
  document.getElementById('eventForm').classList.remove('hidden');
}

function openEditForm(eventId){
  const ev = allEvents.find(e => e.eventId === eventId);
  if (!ev) return;
  editingEventId = eventId;
  document.getElementById('formTitle').textContent = '開催を編集(' + ev.circle + ')';
  document.getElementById('f_circle').value = ev.circle;
  document.getElementById('f_date').value = ev.date;
  document.getElementById('f_name').value = ev.name || '';
  setAreaValue(ev.area);
  document.getElementById('f_station').value = ev.station;

  const timeParts = String(ev.time || '').match(/(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})/);
  document.getElementById('f_timeStart').value = timeParts ? timeParts[1] : '19:00';
  document.getElementById('f_timeEnd').value = timeParts ? timeParts[2] : '21:00';

  document.getElementById('f_fee').value = ev.fee;
  document.getElementById('f_capacity').value = ev.capacity;
  document.getElementById('f_maleCap').value = ev.maleCap || '';
  document.getElementById('f_deadline').value = ev.deadline || '';
  document.getElementById('f_venue').value = ev.venueDetail || '';
  document.getElementById('f_forceFull').checked = !!ev.forceFull;
  document.getElementById('moreFields').classList.add('hidden');
  updateAutoSendNote();
  document.getElementById('eventForm').classList.remove('hidden');
}

document.getElementById('newEventBtn').addEventListener('click', openCreateForm);
document.getElementById('cancelFormBtn').addEventListener('click', () => {
  document.getElementById('eventForm').classList.add('hidden');
});
document.getElementById('toggleMoreBtn').addEventListener('click', () => {
  const moreFields = document.getElementById('moreFields');
  moreFields.classList.toggle('hidden');
});

document.getElementById('saveEventBtn').addEventListener('click', async () => {
  const msgEl = document.getElementById('formMsg');
  msgEl.style.display = 'none';

  const payload = {
    eventId: editingEventId || undefined,
    circle: document.getElementById('f_circle').value,
    date: document.getElementById('f_date').value,
    name: document.getElementById('f_name').value,
    area: getAreaValue(),
    station: document.getElementById('f_station').value,
    time: document.getElementById('f_timeStart').value + '-' + document.getElementById('f_timeEnd').value,
    fee: document.getElementById('f_fee').value,
    capacity: document.getElementById('f_capacity').value,
    maleCap: document.getElementById('f_maleCap').value,
    deadline: document.getElementById('f_deadline').value,
    venueDetail: document.getElementById('f_venue').value,
    forceFull: document.getElementById('f_forceFull').checked
  };

  if (!payload.date) {
    msgEl.textContent = '開催日は必須です';
    msgEl.style.display = 'block';
    return;
  }

  const data = await api('adminSaveEvent', payload);
  if (!data.success) {
    msgEl.textContent = data.error || '保存に失敗しました';
    msgEl.style.display = 'block';
    return;
  }
  document.getElementById('eventForm').classList.add('hidden');
  await loadEvents();
});

// 申込者一覧
function populateApplicantSelect(){
  const monthSel = document.getElementById('applicantMonthSelect');
  const todayStr = new Date().toISOString().slice(0, 10);
  const upcoming = allEvents.filter(ev => ev.date >= todayStr);
  const past = allEvents.filter(ev => ev.date < todayStr);

  // 年月の一覧(「開催予定」を一番上に固定し、そのあと新しい月から並べる)
  const pastMonths = [...new Set(past.map(ev => ev.date.slice(0, 7)))].sort().reverse();
  let monthHtml = upcoming.length > 0 ? '<option value="upcoming">開催予定</option>' : '';
  monthHtml += pastMonths.map(m => {
    const [y, mo] = m.split('-');
    return `<option value="${m}">${y}年${Number(mo)}月</option>`;
  }).join('');
  monthSel.innerHTML = monthHtml;

  const eventsForMonth = (monthValue) => {
    if (monthValue === 'upcoming') return upcoming;
    return past.filter(ev => ev.date.slice(0, 7) === monthValue);
  };

  const populateEventSelect = (monthValue) => {
    const evSel = document.getElementById('applicantEventSelect');
    const list = eventsForMonth(monthValue);
    evSel.innerHTML = list.map(ev => `<option value="${ev.eventId}">[${ev.circle}] ${ev.date} ${ev.name || ''}</option>`).join('');
    if (list[0]) loadApplicants(list[0].eventId);
  };

  monthSel.onchange = () => populateEventSelect(monthSel.value);
  document.getElementById('applicantEventSelect').onchange = (e) => loadApplicants(e.target.value);

  if (monthSel.options.length > 0) {
    monthSel.selectedIndex = 0;
    populateEventSelect(monthSel.value);
  }
}

async function loadApplicants(eventId){
  const ev = allEvents.find(e => e.eventId === eventId);
  const data = await api('adminListApplicants', { eventId, circle: ev ? ev.circle : '' });
  const summary = document.getElementById('applicantSummary');
  const rows = document.getElementById('applicantRows');
  if (!data.success) {
    summary.textContent = data.error || '取得に失敗しました';
    rows.innerHTML = '';
    return;
  }
  summary.textContent = `${data.eventName}(${data.circle}) - ${data.applicants.length}件`;
  rows.innerHTML = data.applicants.map(a => `
    <tr>
      <td>${a.receiptNo}</td>
      <td>${a.name}</td>
      <td>${a.gender}</td>
      <td>${a.racket}</td>
      <td>${a.status}${a.lineLinked ? ' 🔗' : ''}</td>
    </tr>
  `).join('') || '<tr><td colspan="5" style="color:var(--muted);">申込者はいません</td></tr>';
}

function logout(){
  if (token) api('adminLogout', {});
  localStorage.removeItem('fuwabado_admin_token');
  token = '';
  document.getElementById('adminView').classList.add('hidden');
  document.getElementById('loginView').classList.remove('hidden');
  document.getElementById('logoutBtn').classList.add('hidden');
}
document.getElementById('logoutBtn').addEventListener('click', logout);
</script>
</body>
