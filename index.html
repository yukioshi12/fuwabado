<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ふわバド | 参加申込</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://static.line-scdn.net">
<link rel="preconnect" href="https://api.line.me">
<link rel="preconnect" href="https://script.google.com">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js" defer onload="window.__liffSdkReady && window.__liffSdkReady()"></script>
<style>
  :root{
    --bg:#F7F9F4;
    --surface:#FFFFFF;
    --text:#24312B;
    --muted:#6B7A70;
    --accent:#3F7D4A;
    --accent-dark:#2F5F38;
    --warn:#D9534F;
    --highlight:#F2B705;
    --line:#E1E7DC;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Noto Sans JP', sans-serif;
    line-height:1.7;
  }
  h1,h2,.brand{font-family:'Zen Maru Gothic', sans-serif;}

  header.hero{
    padding:40px 20px 28px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .brand{
    font-size:32px;
    font-weight:700;
    color:var(--accent-dark);
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .brand svg{width:34px;height:34px;flex-shrink:0;}
  .hero p{color:var(--muted); margin:8px 0 0; font-size:14px;}

  .arc-divider{width:100%; height:24px; margin-top:10px;}

  main{max-width:520px; margin:0 auto; padding:0 16px 60px;}

  .card{
    background:var(--surface);
    border-radius:16px;
    padding:18px 18px;
    margin-bottom:14px;
    border:1px solid var(--line);
    box-shadow:0 2px 10px rgba(36,49,43,0.04);
  }

  #eventList{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

  .event-card{
    display:flex; flex-direction:column; gap:6px; cursor:pointer;
    border-top:4px solid var(--line); padding:12px 12px;
    transition:background .15s ease, box-shadow .15s ease;
  }
  .event-card.circle-fuwa{border-top-color:var(--accent);}
  .event-card.circle-ebi{border-top-color:#D98A3D;}
  .event-card.selected{background:#F1F8F1; box-shadow:0 0 0 2px var(--accent) inset;}
  .event-card.disabled{opacity:0.55; cursor:not-allowed;}
  .event-body{width:100%;}
  .event-date{font-weight:700; font-size:14px; line-height:1.4;}
  .event-meta{color:var(--muted); font-size:11.5px; line-height:1.5;}
  .badge{
    display:inline-block; font-size:10.5px; font-weight:700; padding:2px 7px;
    border-radius:999px; margin:0 4px 4px 0;
  }
  .badge.ok{background:#E7EFF7; color:#2A5D8F;}
  .badge.warn{background:#FCECEC; color:var(--warn);}
  .badge.circle-fuwa{background:#EAF3EB; color:var(--accent-dark); font-weight:700;}
  .badge.circle-ebi{background:#FDEFE3; color:#B5651D; font-weight:700;}

  label.field{display:block; font-size:13px; font-weight:700; margin:14px 0 6px; color:var(--accent-dark);}
  input[type=text], textarea, select{
    width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--line);
    font-family:inherit; font-size:15px; background:#fff;
  }
  textarea{resize:vertical; min-height:60px;}

  .radio-row{display:flex; gap:10px;}
  .radio-row label{
    flex:1; text-align:center; padding:10px; border-radius:10px; border:1px solid var(--line);
    font-size:14px; cursor:pointer;
  }
  .radio-row input{display:none;}
  .radio-row input:checked + span{color:var(--accent-dark); font-weight:700;}
  .radio-row label.active{border-color:var(--accent); background:#EAF3EB;}

  button.submit{
    width:100%; margin-top:22px; padding:14px; border:none; border-radius:12px;
    background:var(--accent); color:#fff; font-size:16px; font-weight:700;
    cursor:pointer;
  }
  button.submit:disabled{background:#B7C4B9; cursor:not-allowed;}

  .msg{font-size:13px; color:var(--warn); margin-top:10px; display:none;}

  .result{
    text-align:center; padding:30px 20px;
  }
  .receipt-no{
    font-size:40px; font-weight:700; color:var(--accent-dark); letter-spacing:4px;
    font-family:'Zen Maru Gothic', sans-serif; margin:14px 0;
  }
  .steps{text-align:left; margin-top:20px; padding-left:20px; font-size:14px; color:var(--muted);}
  .steps li{margin-bottom:8px;}
  a.line-btn{
    display:inline-block; margin-top:16px; background:#06C755; color:#fff; text-decoration:none;
    padding:12px 24px; border-radius:10px; font-weight:700;
  }
  .hidden{display:none !important;}
</style>
</head>
<body>

<header class="hero">
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 2 L14 9 L21 10 L16 15 L17 22 L12 18 L7 22 L8 15 L3 10 L10 9 Z" fill="#F2B705" opacity="0.9"/></svg>
    ふわバド
  </div>
  <p>ふらっと集まる、ゆるやかバドミントン会</p>
  <svg class="arc-divider" viewBox="0 0 500 24" preserveAspectRatio="none">
    <path d="M0 4 Q250 28 500 4" stroke="#3F7D4A" stroke-width="2" fill="none" stroke-dasharray="1 8" stroke-linecap="round"/>
  </svg>
</header>

<main>
  <div id="formView">
    <h2 style="font-size:17px;">参加したい日程を選ぶ</h2>
    <div id="eventList"></div>
    <div class="msg" id="maleNotice" style="display:none; color:var(--muted);"></div>

    <div class="card">
      <label class="field">お名前</label>
      <input type="text" id="name" placeholder="山田 太郎">

      <label class="field">性別</label>
      <div class="radio-row" id="genderRow">
        <label><input type="radio" name="gender" value="男性"><span>男性</span></label>
        <label><input type="radio" name="gender" value="女性"><span>女性</span></label>
        <label><input type="radio" name="gender" value="回答しない"><span>回答しない</span></label>
      </div>

      <label class="field">ラケットレンタル</label>
      <div class="radio-row" id="racketRow">
        <label><input type="radio" name="racket" value="不要"><span>不要(持参)</span></label>
        <label><input type="radio" name="racket" value="要"><span>必要</span></label>
      </div>

      <label class="field">備考(任意)</label>
      <textarea id="note" placeholder="初参加です、など"></textarea>
    </div>

    <div class="msg" id="errorMsg"></div>
    <button class="submit" id="submitBtn">この内容で申し込む</button>
  </div>

  <div id="resultView" class="hidden">
    <div class="card result">
      <div>お申込みありがとうございます!</div>
      <div style="font-size:15px; margin:16px 0; color:var(--text);">申込内容を受け付けました。</div>
      <ol class="steps">
        <li>開催2日前に会場の詳細案内がLINEに届きます</li>
        <li>それまでは特にお手続きは不要です</li>
      </ol>
    </div>
  </div>
</main>

<script>
// ==== 設定 ====
const API_URL = 'https://script.google.com/macros/s/AKfycbwrpszH3-qr9MZzT7WAArJCMmHEMYGahRA2hFQo_JFsGKxeaYclP0ZWzeSoa5UC9MWi/exec'; // 例: https://script.google.com/macros/s/xxxx/exec
const LIFF_ID = '2010720839-TyRtplXS';

let events = [];
const selected = new Set();
let currentGender = '';
let maleBlockedIds = new Set();
let idToken = null;
let genderLocked = false; // 過去の申込からLINE IDで性別が自動判定された場合はtrue(選択UIを隠す)

// 過去の申込(LINE ID一致)から性別が分かった場合、選択UIごと隠して自動セットする(何も表示しない)
function presetGender(gender){
  currentGender = gender;
  genderLocked = true;
  const row = document.getElementById('genderRow');
  const input = row.querySelector('input[value="' + gender + '"]');
  if (input) input.checked = true;
  row.style.display = 'none';
  const label = row.previousElementSibling;
  if (label && label.tagName === 'LABEL') label.style.display = 'none';
}

function formatDateJp(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d.getTime())) return dateStr;
  const w = ['日','月','火','水','木','金','土'][d.getDay()];
  return dateStr + '(' + w + ')';
}

function renderEvents(){
  const list = document.getElementById('eventList');
  list.innerHTML = events.map(ev => {
    const isMaleBlocked = currentGender === '男性' && maleBlockedIds.has(ev.eventId);
    const effectivelyFull = ev.isFull || isMaleBlocked;
    const disabled = !ev.canApply || isMaleBlocked;
    const isSelected = selected.has(ev.eventId);
    let badge = '';
    if (effectivelyFull) badge = '<span class="badge warn">満席</span>';
    else if (ev.deadlinePassed) badge = '<span class="badge warn">受付終了</span>';
    else badge = '<span class="badge ok">空きあり</span>';

    const circleClass = ev.circle === 'えびバド' ? 'circle-ebi' : 'circle-fuwa';
    const circleBadge = `<span class="badge ${circleClass}">${ev.circle}</span>`;

    return `
      <div class="card event-card ${circleClass} ${isSelected ? 'selected' : ''} ${disabled ? 'disabled':''}" data-id="${ev.eventId}">
        <div class="event-body">
          <div>${circleBadge}</div>
          <div class="event-date">${formatDateJp(ev.date)}${ev.name ? ' ' + ev.name : ''}</div>
          <div>${badge}</div>
          <div class="event-meta">${ev.area}(${ev.station})</div>
          <div class="event-meta">${ev.time}</div>
          <div class="event-meta">${ev.fee}円</div>
        </div>
      </div>`;
  }).join('');

  list.querySelectorAll('.event-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      const ev = events.find(x => x.eventId === id);
      const isMaleBlocked = currentGender === '男性' && maleBlockedIds.has(id);
      if (!ev.canApply || isMaleBlocked) return;
      if (selected.has(id)) selected.delete(id); else selected.add(id);
      renderEvents();
      refreshMaleAvailability();
    });
  });
}

// 性別が「男性」の場合、選択中の日程のうち男性上限に達しているものを判定し、
// 該当する日程は選択解除+満席表示にする(男女比の詳細は表示しない)
async function refreshMaleAvailability(){
  if (currentGender !== '男性' || selected.size === 0) {
    maleBlockedIds = new Set();
    document.getElementById('maleNotice').style.display = 'none';
    return;
  }
  try{
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'checkMaleAvailability', eventIds: Array.from(selected) })
    });
    const data = await res.json();
    if (!data.success) return;

    const blocked = data.blockedEventIds || [];
    maleBlockedIds = new Set(blocked);

    const removedNames = [];
    blocked.forEach(id => {
      if (selected.has(id)) {
        selected.delete(id);
        const ev = events.find(x => x.eventId === id);
        if (ev) removedNames.push(ev.date + ' ' + ev.name);
      }
    });

    const noticeEl = document.getElementById('maleNotice');
    if (removedNames.length > 0) {
      noticeEl.textContent = removedNames.join('、') + ' は満席のため選択を解除しました';
      noticeEl.style.display = 'block';
    } else {
      noticeEl.style.display = 'none';
    }
    renderEvents();
  }catch(err){
    // 通信エラー時は何もせず、送信時の最終チェックに委ねる
  }
}

const LOADING_HTML = '<div class="card" style="grid-column:1/-1; text-align:center; color:var(--muted);">読み込んでいます…</div>';

async function loadEvents(){
  document.getElementById('eventList').innerHTML = LOADING_HTML;
  try{
    const res = await fetch('/api/events');
    const data = await res.json();
    if (data.success) {
      // 開催IDが数値型(日付ベースの自動採番など)で返ってくる場合があるため、
      // HTMLのdata-id(常に文字列)との比較が壊れないようここで文字列に統一する
      events = data.events.map(ev => ({ ...ev, eventId: String(ev.eventId) }));
      renderEvents();
    } else {
      showEventsError_();
    }
  }catch(err){
    showEventsError_();
  }
}

function showEventsError_(){
  document.getElementById('eventList').innerHTML =
    '<div class="card" style="grid-column:1/-1;">' +
    '通信状況が良くないようです。電波の良い場所でお試しください。' +
    '<br><button type="button" id="retryLoadBtn" style="margin-top:10px; padding:8px 16px; border-radius:8px; border:1px solid var(--accent); background:#fff; color:var(--accent); font-weight:700;">もう一度読み込む</button>' +
    '</div>';
  document.getElementById('retryLoadBtn').addEventListener('click', () => {
    document.getElementById('eventList').innerHTML = LOADING_HTML;
    loadEvents();
  });
}

// LINE IDで過去の申込を確認し、性別が分かれば選択UIを省略する
async function checkReturningUser(){
  try{
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'liffCheckUser', idToken })
    });
    const data = await res.json();
    if (data.success && data.isReturning) {
      if (data.gender) presetGender(data.gender);
      if (data.name) {
        const nameInput = document.getElementById('name');
        if (nameInput && !nameInput.value) nameInput.value = data.name;
      }
    } else if (!data.success) {
      // ※デバッグ用の一時表示。原因特定できたらこのブロックごと削除してよい
      const dbg = document.createElement('div');
      dbg.style.cssText = 'font-size:11px; color:#999; margin-top:6px;';
      dbg.textContent = '[debug] liffCheckUser: ' + (data.error || '不明なエラー');
      document.getElementById('eventList').after(dbg);
    }
  }catch(err){
    // 失敗時は通常通り性別を選択してもらう
  }
}

// IDトークン(JWT)のexpクレーム(秒単位のUNIXタイム)を取り出す。壊れている場合はnull
function decodeJwtExp_(token){
  try{
    const payload = token.split('.')[1];
    const base64 = payload.replace(/-/g, '+').replace(/_/g, '/');
    const json = decodeURIComponent(atob(base64).split('').map(c =>
      '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));
    return JSON.parse(json).exp || null;
  }catch(err){
    return null;
  }
}

async function initLiff(){
  try{
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login();
      return; // ログイン画面へ遷移。戻ってきたら再度このページが読み込まれる
    }
    idToken = liff.getIDToken();
    if (!idToken) throw new Error('no id token');

    // LIFF SDKはIDトークンをlocalStorageにキャッシュし、期限が切れても自動更新しないため、
    // ここで有効期限を確認し、切れていれば再ログインさせて新しいトークンを発行させる
    const exp = decodeJwtExp_(idToken);
    if (exp && exp * 1000 < Date.now()) {
      liff.logout();
      liff.login();
      return;
    }

    await checkReturningUser();
  }catch(err){
    // 日程一覧は loadEvents() 側で独立して表示されるため、ここではログイン失敗の案内のみ
    const notice = document.createElement('div');
    notice.className = 'card';
    notice.style.cssText = 'color:var(--warn);';
    notice.textContent = 'LINEログインの確認ができませんでした。お手数ですがLINEアプリ内でこのページを開き直してください。[debug] ' + (err && err.message ? err.message : String(err));
    document.getElementById('eventList').parentElement.insertBefore(notice, document.getElementById('eventList'));
  }
}

// LIFF SDKは defer で読み込んでいるため、読み込み完了(onload)を待ってから initLiff() を呼ぶ
window.__liffSdkReady = initLiff;

// 日程一覧はLINEログインの完了を待たずに取得を開始する(体感速度向上のため)
loadEvents();

document.querySelectorAll('.radio-row label').forEach(label => {
  label.addEventListener('click', () => {
    label.parentElement.querySelectorAll('label').forEach(l => l.classList.remove('active'));
    label.classList.add('active');

    if (label.parentElement.id === 'genderRow') {
      const input = label.querySelector('input');
      currentGender = input ? input.value : '';
      refreshMaleAvailability();
    }
  });
});

document.getElementById('submitBtn').addEventListener('click', async () => {
  const errorEl = document.getElementById('errorMsg');
  errorEl.style.display = 'none';

  const name = document.getElementById('name').value.trim();
  const gender = (document.querySelector('input[name=gender]:checked') || {}).value || '';
  const racket = (document.querySelector('input[name=racket]:checked') || {}).value || '';
  const note = document.getElementById('note').value.trim();

  if (!name || selected.size === 0) {
    errorEl.textContent = 'お名前と参加日程を選択してください';
    errorEl.style.display = 'block';
    return;
  }

  // 入力に時間がかかりIDトークンが期限切れになっていた場合は、送信前に気づかせる
  const exp = idToken ? decodeJwtExp_(idToken) : null;
  if (idToken && exp && exp * 1000 < Date.now()) {
    errorEl.textContent = 'LINEログインの有効期限が切れました。お手数ですがページを開き直してから再度お試しください。';
    errorEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try{
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // GASのCORS回避のためtext/plainで送る
      body: JSON.stringify({
        name, gender, racket, note, idToken,
        eventIds: Array.from(selected)
      })
    });
    const data = await res.json();
    if (!data.success) {
      errorEl.textContent = data.error || '送信に失敗しました';
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'この内容で申し込む';
      return;
    }
    document.getElementById('formView').classList.add('hidden');
    document.getElementById('resultView').classList.remove('hidden');
    window.scrollTo(0,0);
  }catch(err){
    errorEl.textContent = '通信エラーが発生しました。時間をおいて再度お試しください。';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'この内容で申し込む';
  }
});
</script>
</body>
</html>
