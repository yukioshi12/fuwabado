<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ふわバド | 会場詳細</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F9F4; --surface:#FFFFFF; --text:#24312B; --muted:#6B7A70;
    --accent:#3F7D4A; --accent-dark:#2F5F38; --line:#E1E7DC;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:'Noto Sans JP', sans-serif; line-height:1.8;}
  h1{font-family:'Zen Maru Gothic', sans-serif; font-size:20px; color:var(--accent-dark);}
  main{max-width:480px; margin:0 auto; padding:32px 18px;}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:20px;}
  .row{margin-bottom:12px;}
  .label{font-size:12px; color:var(--muted); font-weight:700;}
  .value{font-size:15px;}
  .venue-detail{white-space:pre-wrap; background:#F2F6EF; border-radius:10px; padding:14px; margin-top:8px;}
  .error{color:#D9534F; text-align:center; padding:40px 0;}
</style>
</head>
<body>
<main id="app">読み込み中...</main>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwrpszH3-qr9MZzT7WAArJCMmHEMYGahRA2hFQo_JFsGKxeaYclP0ZWzeSoa5UC9MWi/exec';

function qs(name){
  return new URLSearchParams(location.search).get(name);
}

async function load(){
  const app = document.getElementById('app');
  const eventId = qs('event');
  const token = qs('token');
  if (!eventId || !token) {
    app.innerHTML = '<div class="error">URLが正しくありません</div>';
    return;
  }
  try{
    const res = await fetch(`${API_URL}?action=detail&event=${encodeURIComponent(eventId)}&token=${encodeURIComponent(token)}`);
    const data = await res.json();
    if (!data.success) {
      app.innerHTML = `<div class="error">${data.error}</div>`;
      return;
    }
    app.innerHTML = `
      <h1>${data.circle ? '[' + data.circle + '] ' : ''}${data.name}</h1>
      <div class="card">
        <div class="row"><div class="label">開催日</div><div class="value">${data.date} ${data.time}</div></div>
        <div class="row"><div class="label">エリア</div><div class="value">${data.area}(${data.station})</div></div>
        <div class="row"><div class="label">参加費</div><div class="value">${data.fee}円</div></div>
        <div class="row">
          <div class="label">会場詳細</div>
          <div class="venue-detail">${data.venueDetail}</div>
        </div>
      </div>`;
  }catch(err){
    app.innerHTML = '<div class="error">読み込みに失敗しました。時間をおいて再度お試しください。</div>';
  }
}
load();
</script>
</body>
</html>
